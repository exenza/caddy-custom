name: Build Caddy

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
  schedule:
    - cron: '0 2 * * 1'  # rebuild every Monday to pick up new Caddy releases
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/caddy-custom:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
